<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>3D Aquarium • GitHub Pages Safe</title>
<style>
html,body{height:100%;margin:0;overflow:hidden;background:#f3f5fb;font-family:system-ui}
#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.9);z-index:10}
.card{padding:20px;border-radius:16px;background:#fff;border:1px solid #ddd;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.bar{height:10px;border-radius:999px;background:#eee;overflow:hidden;margin-top:10px}
.bar i{display:block;height:100%;width:0;background:#148c78}
canvas{display:block}
</style>
</head>
<body>

<div id="loading">
  <div class="card">
    <b>Loading Aquarium...</b>
    <div class="bar"><i id="fill"></i></div>
  </div>
</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.fog=new THREE.Fog(0xf1f4fa,4,20);

const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,100);
camera.position.set(3,2,4);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

scene.add(new THREE.HemisphereLight(0xffffff,0x888888,0.8));
const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,8,5);
light.castShadow=true;
scene.add(light);

const tank=new THREE.Group();
scene.add(tank);

const glass=new THREE.Mesh(
 new THREE.BoxGeometry(4,2.2,2.6),
 new THREE.MeshPhysicalMaterial({
  color:0xffffff,transmission:0.9,transparent:true,opacity:1,
  roughness:0.05,metalness:0,ior:1.4,thickness:0.4
 })
);
tank.add(glass);

const water=new THREE.Mesh(
 new THREE.BoxGeometry(3.8,1.6,2.4),
 new THREE.MeshPhysicalMaterial({
  color:new THREE.Color("#39c0a4"),
  transmission:0.7,transparent:true,opacity:0.7,
  roughness:0.1,metalness:0,ior:1.33
 })
);
water.position.y=-0.2;
tank.add(water);

const sand=new THREE.Mesh(
 new THREE.BoxGeometry(3.8,0.2,2.4),
 new THREE.MeshStandardMaterial({color:0xb79a74,roughness:0.9})
);
sand.position.y=-1;
tank.add(sand);

const loader=new THREE.GLTFLoader();
const models=["frog.glb","lotus_flower_with_lillypad.glb","koi_fish.glb","underwater_plant_pack.glb"];
let loadedCount=0;

function loadModel(file,callback){
 loader.load(file,gltf=>{
   callback(gltf.scene);
   loadedCount++;
   document.getElementById("fill").style.width=(loadedCount/models.length*100)+"%";
   if(loadedCount===models.length) document.getElementById("loading").style.display="none";
 });
}

loadModel("lotus_flower_with_lillypad.glb",model=>{
 model.scale.setScalar(0.5);
 model.position.set(-0.8,-0.8,0.3);
 tank.add(model);

 const clone=model.clone(true);
 clone.position.set(0.8,-0.8,-0.2);
 tank.add(clone);
});

loadModel("frog.glb",model=>{
 model.scale.setScalar(0.3);
 model.position.set(-0.8,-0.5,0.3);
 tank.add(model);
});

loadModel("koi_fish.glb",model=>{
 model.scale.setScalar(0.4);
 tank.add(model);

 const clone=model.clone(true);
 clone.position.set(0.5,0,0.5);
 tank.add(clone);
});

loadModel("underwater_plant_pack.glb",model=>{
 model.scale.setScalar(0.4);
 model.position.set(1,-0.9,-0.5);
 tank.add(model);
});

function animate(){
 requestAnimationFrame(animate);
 controls.update();
 renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
 camera.aspect=innerWidth/innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
