<!doctype html><html><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Giant Lily Pad Preview</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#0b1020}#hud{position:fixed;left:12px;top:12px;z-index:5;color:#fff;background:rgba(0,0,0,.4);padding:10px 12px;border-radius:12px;font-family:system-ui}canvas{display:block}</style></head>
<body><div id="hud">Preview: <b>giant_lily_pad_only.glb</b><br>Drag orbit • Scroll zoom</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const r=new THREE.WebGLRenderer({antialias:true});r.setSize(innerWidth,innerHeight);r.outputEncoding=THREE.sRGBEncoding;document.body.appendChild(r.domElement);
const s=new THREE.Scene();s.add(new THREE.HemisphereLight(0xffffff,0x223344,.9));
const d=new THREE.DirectionalLight(0xffffff,1);d.position.set(3,5,2);s.add(d);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.01,100);c.position.set(1.6,1.2,1.6);
const o=new THREE.OrbitControls(c,r.domElement);o.target.set(0,.02,0);o.enableDamping=true;
const g=new THREE.PlaneGeometry(3,3);const m=new THREE.MeshStandardMaterial({color:0x1f2937,roughness:1});const p=new THREE.Mesh(g,m);p.rotation.x=-Math.PI/2;s.add(p);
new THREE.GLTFLoader().load('giant_lily_pad_only.glb', gltf=>{ const obj=gltf.scene; obj.traverse(x=>{if(x.isMesh){x.castShadow=true;x.receiveShadow=true;}}); s.add(obj); }, undefined, e=>console.error(e));
function anim(){requestAnimationFrame(anim);o.update();r.render(s,c);}anim();
addEventListener('resize',()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight);});
</script></body></html>
